name: Node Version Compatibility Check

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 18.x, 20.x, 22.x, 24.x ]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: "Installing build deps"
        run: npm i -g pnpm
      - name: "Installing deps"
        run: pnpm i
      - name: "Typecheck"
        run: pnpm typecheck
      - name: "Test"
        run: pnpm test
      - name: "Build"
        run: pnpm build

      # Adapter deps live in each adapter's own lockfile; the root install does
      # not reach them.
      - name: "Install adapter deps"
        run: |
          for dir in adapter/*/; do
            if [ -f "$dir/package.json" ]; then
              (cd "$dir" && pnpm install --ignore-scripts)
            fi
          done

      - name: "Build adapters"
        run: pnpm build:adapters

      # Guards the failure that shipped raw .ts to npm for several releases:
      # typecheck and build both passed while the tarballs held no JavaScript.
      - name: "Verify packaging"
        run: pnpm verify:packaging
