name: Take Snap

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  snap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 24.x ]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: "Installing build deps"
        run: npm i -g pnpm
      - name: "Installing deps"
        run: pnpm i
      - name: "Build project"
        run: pnpm build
      - name: "Install playwright browsers"
        run: |
          pnpm exec playwright install --with-deps chromium
      - name: "Take screenshot"
        run: |
          set -euo pipefail
          pnpm dev:server > /tmp/http-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT

          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3000/ > /dev/null; then
              break
            fi
            sleep 1
          done

          curl -sf http://127.0.0.1:3000/ > /dev/null
          npx tsc -p tsconfig.scripts.json
          node dist-scripts/script/snap.js

      - name: "Debug server logs on failure"
        if: failure()
        run: cat /tmp/http-server.log
      - name: "Push to GitHub"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f snap/screenshot.png
          git commit -m "[chores]: updated snap" || echo "No changes to commit"
          git push
